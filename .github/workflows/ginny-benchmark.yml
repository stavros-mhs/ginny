name: Ginny Benchmark

on:
  workflow_dispatch:
    inputs:
      pdfs:
        description: "Comma-separated pdf file names in test_cases/"
        required: true
        type: string
      model:
        description: "Model name (e.g. gpt-4o)"
        required: true
        type: string
      runs:
        description: "How many times Ginny will execute given the model per file"
        required: true
        default: "1"
        type: string

jobs:
  solve:
    runs-on: ubuntu-22.04
    env:
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_ENDPOINT: "https://eu.api.smith.langchain.com"
      LANGSMITH_TRACING: "true"
      LANGSMITH_PROJECT: "ginny-autonomous-homework-solving-system"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up C environment
        run: sudo apt-get update && sudo apt-get install -y gcc build-essential

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
        
      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install

      - name: Benchmark Ginny
        run: |
          IFS=',' read -ra FILES <<< "${{ github.event.inputs.pdfs }}"
          RUNS=${{ github.event.inputs.runs }}
          MODEL="${{ github.event.inputs.model }}"

          for FILE in "${FILES[@]}"; do
            FILE=$(echo "$FILE" | xargs)
            for ((i=1; i<=RUNS; i++)); do
              echo "Running Ginny on $FILE (run $i of $RUNS)"
              poetry run ginny solve "./test_cases/$FILE" --model="$MODEL"
              mv snapshots "snapshots_${FILE%.*}"_run${i}
            done
          done